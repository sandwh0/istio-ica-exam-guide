apiVersion: v1
kind: Namespace
metadata:
  name: mirroring-lab
  labels:
    istio-injection: enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-v1
  namespace: mirroring-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
      version: v1
  template:
    metadata:
      labels:
        app: api
        version: v1
    spec:
      containers:
        - name: api
          image: hashicorp/http-echo:1.0.0
          args: ["-listen=:8080", "-text=api-v1"]
          ports:
            - containerPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-v2
  namespace: mirroring-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
      version: v2
  template:
    metadata:
      labels:
        app: api
        version: v2
    spec:
      containers:
        - name: api
          image: hashicorp/http-echo:1.0.0
          args: ["-listen=:8080", "-text=api-v2"]
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: mirroring-lab
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 80
      targetPort: 8080
