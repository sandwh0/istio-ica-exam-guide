# Task 1: Create mirror routing
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: api
  namespace: mirroring-lab
spec:
  host: api
  subsets:
    - name: v1
      labels:
        version: v1
    - name: v2
      labels:
        version: v2
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: api
  namespace: mirroring-lab
spec:
  hosts:
    - api
  http:
    - route:
        - destination:
            host: api
            subset: v1
      mirror:
        host: api
        subset: v2
      mirrorPercentage:
        value: 100
