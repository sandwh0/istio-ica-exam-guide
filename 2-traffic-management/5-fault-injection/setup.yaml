apiVersion: v1
kind: Namespace
metadata:
  name: ratings
  labels:
    istio-injection: enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ratings
  namespace: fault-injection-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ratings
  template:
    metadata:
      labels:
        app: ratings
    spec:
      containers:
        - name: ratings
          image: nginx
---
apiVersion: v1
kind: Service
metadata:
  name: ratings
  namespace: fault-injection-lab
spec:
  selector:
    app: ratings
  ports:
    - name: http
      port: 80
      targetPort: 8080

apiVersion: v1
kind: Namespace
metadata:
  name: api
  labels:
    istio-injection: enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      containers:
        - name: api-server
          image: nginx
---
apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: api
spec:
  selector:
    app: api-server
  ports:
    - name: http
      port: 80
      targetPort: 8080
