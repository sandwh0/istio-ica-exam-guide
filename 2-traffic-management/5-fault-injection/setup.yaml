apiVersion: v1
kind: Namespace
metadata:
  name: fault-injection-lab
  labels:
    istio-injection: enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ratings
  namespace: fault-injection-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ratings
  template:
    metadata:
      labels:
        app: ratings
    spec:
      containers:
        - name: ratings
          image: hashicorp/http-echo:1.0.0
          args: ["-listen=:8080", "-text=ratings"]
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: ratings
  namespace: fault-injection-lab
spec:
  selector:
    app: ratings
  ports:
    - name: http
      port: 80
      targetPort: 8080
