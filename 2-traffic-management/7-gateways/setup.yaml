apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: gateway-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      containers:
        - name: portal
          image: hashicorp/http-echo:1.0.0
          args: ["-listen=:8080", "-text=portal"]
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: portal
  namespace: gateway-lab
spec:
  selector:
    app: portal
  ports:
    - name: http
      port: 8080
      targetPort: 8080
