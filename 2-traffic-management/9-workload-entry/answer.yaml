# Task 1: Create workload entry resources
apiVersion: networking.istio.io/v1
kind: WorkloadEntry
metadata:
  name: the-cabbage-vm
  namespace: cabbage
spec:
  address: 192.168.10.10
  labels:
    app: cabbage
    location: external
---
# Task 2: Expose workload via ServiceEntry
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: cabbage
  namespace: cabbage
spec:
  hosts:
    - cabbage.internal
  location: MESH_INTERNAL
  ports:
    - number: 80
      name: http
      protocol: HTTP
  resolution: STATIC
  workloadSelector:
    labels:
      app: cabbage
      location: external
