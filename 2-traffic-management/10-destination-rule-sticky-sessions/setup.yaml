apiVersion: v1
kind: Namespace
metadata:
  name: virtualservice-lab
  labels:
    istio-injection: enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: virtualservice-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: hashicorp/http-echo:1.0.0
          args: ["-listen=:8080", "-text=web"]
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: virtualservice-lab
spec:
  selector:
    app: web
  ports:
    - name: http
      port: 80
      targetPort: 8080
