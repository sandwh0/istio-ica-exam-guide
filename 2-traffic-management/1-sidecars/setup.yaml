apiVersion: v1
kind: Namespace
metadata:
  name: sidecar-lab
  labels:
    istio-injection: enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: sidecar-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: curlimages/curl:8.7.1
          command: ["/bin/sh", "-c", "sleep 365d"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments
  namespace: sidecar-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments
  template:
    metadata:
      labels:
        app: payments
    spec:
      containers:
        - name: payments
          image: hashicorp/http-echo:1.0.0
          args: ["-listen=:8080", "-text=payments"]
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: payments
  namespace: sidecar-lab
spec:
  selector:
    app: payments
  ports:
    - name: http
      port: 80
      targetPort: 8080
