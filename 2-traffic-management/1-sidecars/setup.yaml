apiVersion: v1
kind: Namespace
metadata:
  name: sidecar-lab
  labels:
    istio-injection: enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: security
  labels:
    istio-injection: security
---
apiVersion: v1
kind: Namespace
metadata:
  name: super-security
  labels:
    istio-injection: security
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: sidecar-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: curlimages/curl:8.7.1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments
  namespace: super-security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments
  template:
    metadata:
      labels:
        app: payments
    spec:
      containers:
        - name: payments
          image: hashicorp/http-echo:1.0.0
---
apiVersion: v1
kind: Service
metadata:
  name: payments
  namespace: sidecar-lab
spec:
  selector:
    app: payments
  ports:
    - name: http
      port: 80
      targetPort: 8080
