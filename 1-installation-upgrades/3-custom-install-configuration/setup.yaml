apiVersion: v1
kind: Namespace
metadata:
  name: mesh-customisation
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample
  namespace: mesh-customisation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample
  template:
    metadata:
      labels:
        app: sample
    spec:
      containers:
        - name: sample
          image: hashicorp/http-echo:1.0.0
          args:
            - -listen=:8080
            - -text=custom-install
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: sample
  namespace: mesh-customisation
spec:
  selector:
    app: sample
  ports:
    - name: http
      port: 80
      targetPort: 8080
