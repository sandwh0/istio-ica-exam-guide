apiVersion: v1
kind: Namespace
metadata:
  name: istioctl-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo
  namespace: istioctl-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo
  template:
    metadata:
      labels:
        app: echo
    spec:
      containers:
        - name: echo
          image: hashicorp/http-echo:1.0.0
          args:
            - -listen=:8080
            - -text=istioctl-install
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: echo
  namespace: istioctl-lab
spec:
  selector:
    app: echo
  ports:
    - name: http
      port: 80
      targetPort: 8080
