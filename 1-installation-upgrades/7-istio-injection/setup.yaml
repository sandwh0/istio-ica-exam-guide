apiVersion: v1
kind: Namespace
metadata:
  name: injection-auto
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: injection-auto
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: hashicorp/http-echo:1.0.0
          args:
            - -listen=:8080
            - -text=injection-auto
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: manual-demo
  namespace: injection-auto
data:
  manifest: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: frontend
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: frontend
      template:
        metadata:
          labels:
            app: frontend
        spec:
          containers:
            - name: frontend
              image: hashicorp/http-echo:1.0.0
              args:
                - -listen=:8080
                - -text=injection-manual
              ports:
                - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: injection-auto
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080
