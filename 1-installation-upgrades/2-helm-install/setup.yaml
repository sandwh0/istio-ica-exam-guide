apiVersion: v1
kind: Namespace
metadata:
  name: helm-install-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: helm-install-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: hashicorp/http-echo:1.0.0
          args:
            - -listen=:8080
            - -text=helm-install
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: helm-install-lab
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 80
      targetPort: 8080
