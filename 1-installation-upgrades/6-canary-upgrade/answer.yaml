# Task 1: Install lower version revision
# Run:
#   istioctl install --set profile=demo --revision 1-21-0 -y
#   kubectl rollout restart deployment frontend -n canary-upgrade-lab
#   kubectl rollout status deployment frontend -n canary-upgrade-lab
#
# Task 2: Install newer canary revision
# Run:
#   istioctl install --set profile=demo --revision 1-22-0 -y
#
# Task 3: Move namespace to new revision
# Run:
#   kubectl label namespace canary-upgrade-lab istio.io/rev=1-22-0 --overwrite
#   kubectl rollout restart deployment frontend -n canary-upgrade-lab
#   kubectl rollout status deployment frontend -n canary-upgrade-lab
