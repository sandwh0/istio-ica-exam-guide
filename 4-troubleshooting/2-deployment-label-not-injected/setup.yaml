apiVersion: v1
kind: Namespace
metadata:
  name: deployment-label-lab
  labels:
    istio-injection: enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: deployment-label-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: frontend
          image: hashicorp/http-echo:1.0.0
          args: ["-listen=:8080", "-text=frontend"]
          ports:
            - containerPort: 8080
