apiVersion: v1
kind: Namespace
metadata:
  name: lab-two
  labels:
    istio-injection: enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: lab-two
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: frontend
          image: hashicorp/http-echo:1.0.0
          ports:
            - containerPort: 8080
