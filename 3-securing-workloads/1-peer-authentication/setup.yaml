apiVersion: v1
kind: Namespace
metadata:
  name: peer-auth-lab
  labels:
    istio-injection: enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: peer-auth-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: nginx
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: peer-auth-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: nginx
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: peer-auth-lab
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 80
      targetPort: 8080
