apiVersion: v1
kind: Namespace
metadata:
  name: authz-lab
  labels:
    istio-injection: enabled
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend
  namespace: authz-lab
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin
  namespace: authz-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin
  namespace: authz-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: httpbin
  template:
    metadata:
      labels:
        app: httpbin
    spec:
      containers:
        - name: httpbin
          image: kennethreitz/httpbin
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin
  namespace: authz-lab
spec:
  selector:
    app: httpbin
  ports:
    - name: http
      port: 8000
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: authz-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      serviceAccountName: frontend
      containers:
        - name: frontend
          image: curlimages/curl:8.7.1
          command: ["/bin/sh", "-c", "sleep 365d"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: authz-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      serviceAccountName: admin
      containers:
        - name: admin
          image: curlimages/curl:8.7.1
          command: ["/bin/sh", "-c", "sleep 365d"]
