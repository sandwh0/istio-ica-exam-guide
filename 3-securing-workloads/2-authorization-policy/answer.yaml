# Task 1: Basic AuthorizationPolicy (allow from frontend SA)
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-frontend
  namespace: authz-lab
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/authz-lab/sa/frontend
---
# Task 2: Selector-specific AuthorizationPolicy
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-frontend-httpbin
  namespace: authz-lab
spec:
  selector:
    matchLabels:
      app: httpbin
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/authz-lab/sa/admin
      to:
        - operation:
            methods: ["POST"]
            paths: ["/post"]
---
# Task 6: Deny-all policy for httpbin
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: deny-all-httpbin
  namespace: deny-all
spec: {}
---
# Task 7: Multi-rule policy
# Run before applying this task if Task 6 is still present:
#   kubectl delete authorizationpolicy deny-all-httpbin -n authz-lab
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: api-access
  namespace: authz-lab
spec:
  selector:
    matchLabels:
      app: httpbin
  action: ALLOW
  rules:
    - to:
        - operation:
            methods: ["GET"]
            paths: ["/get", "/headers", "/ip"]
    - from:
        - source:
            principals: ["cluster.local/ns/authz-lab/sa/admin"]
      to:
        - operation:
            methods: ["POST"]
            paths: ["/post"]
